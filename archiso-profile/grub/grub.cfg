# edpearOS GRUB configuration for the live ISO

insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660
insmod loopback
insmod linux
insmod gfxterm

set timeout=10
set default=0
set gfxmode=auto
set gfxpayload=keep

loadfont unicode

terminal_input console
terminal_output gfxterm

set theme=/boot/grub/themes/edpearos/theme.txt

menuentry "edpearOS (Live Session)" --class arch --class os {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=2G
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
}

menuentry "edpearOS (Copy to RAM)" --class arch {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% copytoram
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
}

menuentry "edpearOS (Safe Graphics)" --class arch {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% nomodeset
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
}

menuentry "System shutdown" --class shutdown {
    echo "System shutting down..."
    halt
}

menuentry "System restart" --class restart {
    echo "System rebooting..."
    reboot
}
