# edpearOS Student Setup — Custom Calamares Module
# This module presents a student major selection page during installation.
# The selected major determines which extra packages to install.
---
type: "view"
name: "student-setup"
interface: "qtplugin"
load: "StudentSetupViewStep"

# Fallback: if the QML plugin isn't available, use a simple script
script: "/etc/calamares/modules/student-setup-script.sh"

profiles:
  STEM:
    description: "Math, Physics, Engineering, Computer Science"
    packages:
      - texlive-basic
      - texlive-latexrecommended
      - python-numpy
      - python-matplotlib
      - python-scipy
      - jupyter-notebook
      - octave
  
  Writing:
    description: "English, History, Philosophy, Essay Writing"
    packages:
      - texlive-latexrecommended
      - texlive-humanities
  
  Art:
    description: "Visual Arts, Graphic Design, UI/UX"
    packages:
      - gimp
      - inkscape
      - krita
      - blender
  
  Programming:
    description: "Software Development, Web Dev, Data Science"
    packages:
      - docker
      - python-pandas
      - python-scikit-learn
      - jupyter-notebook
      - rust
      - go

  General:
    description: "Mixed subjects, General productivity"
    packages: []
