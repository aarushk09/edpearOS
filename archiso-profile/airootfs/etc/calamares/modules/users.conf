# Calamares users module
---
defaultGroups:
    - name: users
      must_exist: false
      system: true
    - lp
    - video
    - network
    - storage
    - name: wheel
      must_exist: false
      system: true
    - audio
    - rfkill

autologinGroup: autologin

doAutologin: false

sudoersGroup: wheel
sudoersConfigureWithGroup: true

setRootPassword: true
doReusePassword: true

passwordRequirements:
    nonempty: true
    minLength: 4
    maxLength: -1

allowWeakPasswords: false
allowWeakPasswordsDefault: false

userShell: /bin/bash
